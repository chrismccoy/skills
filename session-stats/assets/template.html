<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Session Insights</title>
<style>
  :root {
    --ink: #0b0a0c; --coal: #16141a; --bone: #f7f4ee;
    --accent: #e6a53d; --ember: #ff6b6b; --line: rgba(247, 244, 238, 0.1);
    --bone-55: rgba(247, 244, 238, 0.55);
    --bone-50: rgba(247, 244, 238, 0.50);
    --bone-45: rgba(247, 244, 238, 0.45);
    --sans: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
    --mono: ui-monospace, "Space Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--ink); color: var(--bone); font: 16px/1.5 var(--sans); }
  .wrap { max-width: 880px; margin: 0 auto; padding: 40px 20px 80px; }
  h1 { margin: 0 0 4px; font-size: 1.5rem; font-weight: 700; letter-spacing: -.02em; line-height: 1.2; }
  .meta { margin: 13px 0; font-family: var(--mono); font-size: 13px; color: var(--bone-55); }
  .meta b { font-weight: 600; color: var(--accent); }
  .meta code { font-family: var(--mono); }
  .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 24px; }
  @media (min-width: 640px) { .kpi-grid { grid-template-columns: repeat(3, 1fr); } }
  .kpi { border: 1px solid var(--line); border-radius: 16px; background: var(--coal); padding: 16px; }
  .kpi .value { font-size: 1.5rem; font-weight: 700; letter-spacing: -.02em; }
  .kpi .label { margin-top: 4px; font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--bone-50); }
  h2.section { margin: 36px 0 12px; font-family: var(--mono); font-size: 12px; font-weight: 400; text-transform: uppercase; letter-spacing: .08em; color: var(--bone-50); }
  table.t { width: 100%; background: var(--coal); border: 1px solid var(--line); border-radius: 16px; border-collapse: separate; border-spacing: 0; overflow: hidden; }
  table.t th { border-bottom: 1px solid var(--line); padding: 10px 14px; text-align: left; font-family: var(--mono); font-size: 11px; font-weight: 400; text-transform: uppercase; letter-spacing: .06em; color: var(--bone-45); }
  table.t td { border-bottom: 1px solid var(--line); padding: 10px 14px; text-align: left; font-size: 13px; }
  table.t tbody tr:last-child td { border-bottom: none; }
  .num { width: 1%; white-space: nowrap; text-align: right; font-family: var(--mono); }
  th.num { text-align: right; }
  .share { width: 40%; }
  .bar { display: block; height: 8px; min-width: 2px; border-radius: 6px; background: linear-gradient(90deg, var(--accent), var(--ember)); }
  .pct { color: var(--bone-50); }
  code { font-family: var(--mono); }
</style>
</head>
<body>
<div class="wrap">
  <!-- CONTENT -->
</div>
</body>
</html>
